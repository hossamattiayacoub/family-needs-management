<div class="page-container">
  <div class="page-header">
    <h1>Groups Lookup</h1>
    <button mat-flat-button color="primary" (click)="openAddDialog()">
      <mat-icon>add</mat-icon>
      Add Group
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Search by Group Name</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="e.g. North District">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="GroupId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Group Id</th>
            <td mat-cell *matCellDef="let row">{{ row.GroupId }}</td>
          </ng-container>

          <ng-container matColumnDef="GroupName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Group Name</th>
            <td mat-cell *matCellDef="let row">{{ row.GroupName }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button color="primary" (click)="openEditDialog(row)" aria-label="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="openDeleteDialog(row)" aria-label="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              @if (isLoaded()) {
                No groups found.
              } @else {
                Loading groups...
              }
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
